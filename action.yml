name: gha-check-release-exists
author: Alex Vincent
description: Checks if a GitHub release exists in the current repository.

branding:
  icon: tag
  color: blue

inputs:
  GITHUB_TOKEN:
    description: GitHub token, i.e. secrets.GITHUB_TOKEN
    required: true
  ReleaseName:
    description: Release name to check, i.e. '1.2.2' or '1.2.2-2022-04-ci-updates.13'
    required: true

outputs:
  ReleaseExists:
    description: Whether the release exists, i.e. 'true' or 'false'
    value: ${{ steps.check-release.outputs.ReleaseExists }}

runs:
  using: composite
  steps:
    # - id: check-release
    #   name: Check release exists
    #   shell: pwsh
    #   run: |
    #     $ReleaseExists = &"${{ github.action_path }}/.scripts/Invoke-CheckReleaseExists.ps1" `
    #       -ReleaseName $env:RELEASE_NAME
    #     echo "ReleaseExists=$ReleaseExists" >> $env:GITHUB_OUTPUT
    #   env:
    #     GITHUB_TOKEN: ${{ inputs.GITHUB_TOKEN }}
    #     RELEASE_NAME: ${{ inputs.ReleaseName }}

    - id: check-release
      name: Check release exists
      shell: bash
      run: |
        if gh release view "$RELEASE_NAME" --json tagName > /dev/null 2>&1; then
          echo "::warning::Release '$RELEASE_NAME' already exists."
          echo "ReleaseExists=true" >> "$GITHUB_OUTPUT"
        else
          echo "Release '$RELEASE_NAME' not found."
          echo "ReleaseExists=false" >> "$GITHUB_OUTPUT"
        fi
      env:
        GITHUB_TOKEN: ${{ inputs.GITHUB_TOKEN }}
        RELEASE_NAME: ${{ inputs.ReleaseName }}
