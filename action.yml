name: gha-check-release-exists
author: Alex Vincent
description: Checks if a GitHub release exists in the current repository.

branding:
  icon: tag
  color: blue

inputs:
  GITHUB_TOKEN:
    description: GitHub token, i.e. secrets.GITHUB_TOKEN
    required: true
  ReleaseName:
    description: Release name to check, i.e. '1.2.2' or '1.2.2-2022-04-ci-updates.13'
    required: true
  Shell:
    description: Shell to use for the check, i.e. 'bash' (default) or 'pwsh' for Windows agents without bash
    required: false
    default: bash

outputs:
  ReleaseExists:
    description: Whether the release exists, i.e. 'true' or 'false'
    value: ${{ inputs.Shell == 'pwsh' && steps.check-release-pwsh.outputs.ReleaseExists || steps.check-release-bash.outputs.ReleaseExists }}

runs:
  using: composite
  steps:
    - id: check-release-pwsh
      name: Check release exists (pwsh)
      if: ${{ inputs.Shell == 'pwsh' }}
      shell: pwsh
      run: |
        $ReleaseExists = &"${{ github.action_path }}/.scripts/Invoke-CheckReleaseExists.ps1" `
          -ReleaseName $env:RELEASE_NAME
        echo "ReleaseExists=$ReleaseExists" >> $env:GITHUB_OUTPUT
      env:
        GITHUB_TOKEN: ${{ inputs.GITHUB_TOKEN }}
        RELEASE_NAME: ${{ inputs.ReleaseName }}

    - id: check-release-bash
      name: Check release exists (bash)
      if: ${{ inputs.Shell == 'bash' }}
      shell: bash
      run: "${{ github.action_path }}/.scripts/check-release-exists.sh"
      env:
        GITHUB_TOKEN: ${{ inputs.GITHUB_TOKEN }}
        RELEASE_NAME: ${{ inputs.ReleaseName }}
